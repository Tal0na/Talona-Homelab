theme:
  background-color: 240 21 15
  contrast-multiplier: 1.2
  primary-color: 217 92 83
  positive-color: 115 54 76
  negative-color: 347 70 65

pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday

          - type: rss
            limit: 10
            collapse-after: 3
            cache: 12h
            feeds:
              - url: https://selfh.st/rss/
                title: selfh.st
                limit: 4
              - url: https://ciechanow.ski/atom.xml
              - url: https://www.joshwcomeau.com/rss.xml
                title: Josh Comeau
              - url: https://samwho.dev/rss.xml
              - url: https://ishadeed.com/feed.xml
                title: Ahmad Shadeed

          - type: twitch-channels
            channels:
              - theprimeagen
              - calango
              - Baiano
              - Alanzoka
              - christitustech
              - Felps
              - tioorochitwitch
      - size: full
        widgets:
          - type: group
            widgets:
              - type: hacker-news
                subreddit: selfhosted
          - type: videos
            channels:
              - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
              - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
              - UCsBjURrPoezykLs9EqgamOA # Fireship
              - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
              - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
              - UC6Ti5WHGVusY4I6iKsX10Zg # linuxnext
              - UCHlUuVXyQvLQgjYAeVxEWKw # BrodieRobertsonReacts
              - UCEf5U1dB5a2e2S-XUlnhxSA # Diolinux

          - type: group
            widgets:
              - type: reddit
                subreddit: technology
                show-thumbnails: true
              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true
              - type: reddit
                subreddit: gnome
                show-thumbnails: true
              - type: reddit
                subreddit: Fedora
                show-thumbnails: true
              - type: reddit
                subreddit: kde
                show-thumbnails: true

      - size: small
        widgets:
          - type: weather
            location: Belo Horizonte, Brazil
            units: metric
            hour-format: 24h

          - type: markets
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: MSFT
                name: Microsoft

          - type: releases
            cache: 1d
            repositories:
              - deluan/navidrome
              - LawnchairLauncher/lawnchair
              - zen-browser/desktop
              - jeffvli/feishin
              - pi-hole/docker-pi-hole
              - breezy-weather/breezy-weather
              - dweymouth/supersonic
              - kawaiiDango/pano-scrobbler
              - GloriousEggroll/proton-ge-custom
              - glanceapp/glance
              - jmshrv/finamp