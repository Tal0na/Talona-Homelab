version: "3.9"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - /home/talona/jellyfin/config:/config
      - /home/talona/Publico/Film:/media/filmes
      - /home/talona/Publico/Music:/media/musicas
    restart: unless-stopped